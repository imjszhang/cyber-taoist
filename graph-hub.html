<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Prism — 知识图谱</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface-hover: #22263a;
  --border: #2a2e3f;
  --text: #e4e6ed;
  --text-dim: #8b8fa3;
  --accent: #6c8cff;
  --accent-hover: #8aa4ff;
  --green: #4ade80;
  --yellow: #facc15;
  --red: #f87171;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}
.header {
  padding: 2.5rem 2rem 1.5rem;
  max-width: 960px;
  margin: 0 auto;
}
.header h1 {
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.header h1 span { color: var(--accent); }
.header p {
  color: var(--text-dim);
  margin-top: 0.35rem;
  font-size: 0.875rem;
}
.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 2rem 3rem;
}
.empty {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--text-dim);
}
.empty p { margin-top: 0.5rem; font-size: 0.875rem; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 0.75rem;
  transition: background 0.15s;
}
.card:hover { background: var(--surface-hover); }
.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.card-name {
  font-size: 1.05rem;
  font-weight: 600;
}
.badge {
  font-size: 0.7rem;
  padding: 0.15rem 0.55rem;
  border-radius: 999px;
  font-weight: 500;
  white-space: nowrap;
}
.badge-enabled { background: rgba(74,222,128,0.15); color: var(--green); }
.badge-disabled { background: rgba(248,113,113,0.15); color: var(--red); }
.card-path {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-top: 0.3rem;
  word-break: break-all;
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
}
.card-meta {
  display: flex;
  align-items: center;
  gap: 1.25rem;
  margin-top: 0.75rem;
  font-size: 0.8rem;
  color: var(--text-dim);
}
.graph-status {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
}
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  display: inline-block;
}
.dot-ok { background: var(--green); }
.dot-no { background: var(--red); opacity: 0.5; }
.btn {
  display: inline-block;
  padding: 0.4rem 1rem;
  border-radius: 6px;
  font-size: 0.8rem;
  font-weight: 500;
  text-decoration: none;
  transition: background 0.15s, opacity 0.15s;
  cursor: pointer;
  border: none;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-disabled {
  background: var(--border);
  color: var(--text-dim);
  cursor: not-allowed;
  pointer-events: none;
}
.card-actions { margin-top: 0.85rem; }
.loading {
  text-align: center;
  padding: 4rem;
  color: var(--text-dim);
}
.error {
  text-align: center;
  padding: 2rem;
  color: var(--red);
}
</style>
</head>
<body>
<div class="header">
  <h1><span>Knowledge Prism</span> — 知识图谱总览</h1>
  <p>查看所有已注册知识库的知识图谱</p>
</div>
<div class="container" id="app">
  <div class="loading">加载中…</div>
</div>
<script>
(function() {
  const app = document.getElementById("app");

  fetch("./api/bases.json")
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(render)
    .catch(err => {
      app.innerHTML = '<div class="error">加载失败: ' + err.message + '</div>';
    });

  function render(data) {
    const bases = data.bases || [];
    if (bases.length === 0) {
      app.innerHTML =
        '<div class="empty">' +
        '<p style="font-size:2rem">📭</p>' +
        '<p>尚未注册任何知识库</p>' +
        '<p>运行 <code>openclaw prism register &lt;dir&gt;</code> 添加知识库</p>' +
        '</div>';
      return;
    }

    let html = "";
    bases.forEach(function(base, i) {
      const enabledBadge = base.enabled
        ? '<span class="badge badge-enabled">启用</span>'
        : '<span class="badge badge-disabled">禁用</span>';
      const graphDot = base.graphExists
        ? '<span class="dot dot-ok"></span> 图谱已生成'
        : '<span class="dot dot-no"></span> 图谱未生成';
      const lastTs = base.lastProcessedAt
        ? base.lastProcessedAt.replace("T", " ").slice(0, 16)
        : "从未处理";
      const regTs = base.registeredAt
        ? base.registeredAt.replace("T", " ").slice(0, 16)
        : "";
      const btn = base.graphExists
        ? '<a class="btn btn-primary" href="./graph/' + i + '" target="_blank">查看图谱</a>'
        : '<span class="btn btn-disabled">运行 prism graph 生成</span>';

      html +=
        '<div class="card">' +
        '  <div class="card-top">' +
        '    <span class="card-name">' + esc(base.name) + '</span>' +
        '    ' + enabledBadge +
        '  </div>' +
        '  <div class="card-path">' + esc(base.baseDir) + '</div>' +
        '  <div class="card-meta">' +
        '    <span class="graph-status">' + graphDot + '</span>' +
        '    <span>上次处理: ' + esc(lastTs) + '</span>' +
        (regTs ? '    <span>注册于: ' + esc(regTs) + '</span>' : '') +
        '  </div>' +
        '  <div class="card-actions">' + btn + '</div>' +
        '</div>';
    });
    app.innerHTML = html;
  }

  function esc(s) {
    if (!s) return "";
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
})();
</script>
</body>
</html>
